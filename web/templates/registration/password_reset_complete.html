{% extends 'base.html' %}

{% block body_class %}auth-page{% endblock %}

{% block content %}
<section class="auth-layout">
    <div class="auth-card auth-card-compact">
        <div class="auth-head">
            <p class="auth-kicker">Success</p>
            <h1>Password Updated</h1>
            <p class="auth-subtitle">Your password has been reset successfully. You can sign in now.</p>
        </div>

        <p class="auth-switch"><a href="{% url 'login' %}">Go to login</a></p>
    </div>
</section>
{% endblock %}
