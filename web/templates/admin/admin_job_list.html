{% extends 'base.html' %}

{% block content %}
<h2>Manage Jobs</h2>
<div class="card">
    <a class="btn" href="{% url 'admin_job_create' %}">Add Job</a>
</div>

<div class="grid">
    {% for job in jobs %}
        <div class="card">
            <h4>{{ job.title }}</h4>
            <p>{{ job.company }} · {{ job.location }}</p>
            <div class="actions">
                <a class="btn secondary" href="{% url 'admin_job_edit' job.id %}">Edit</a>
                <form method="post" action="{% url 'admin_job_delete' job.id %}" class="inline-form">
                    {% csrf_token %}
                    <button class="btn danger" type="submit">Delete</button>
                </form>
            </div>
        </div>
    {% empty %}
        <p>No jobs yet.</p>
    {% endfor %}
</div>
{% endblock %}
