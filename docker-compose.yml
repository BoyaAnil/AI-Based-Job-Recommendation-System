version: "3.9"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: resume_ai
      POSTGRES_USER: resume_user
      POSTGRES_PASSWORD: resume_pass
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  ai:
    build: ./ai
    ports:
      - "5000:5000"
    env_file:
      - ./ai/.env
    volumes:
      - ./ai:/app
      - media_data:/app/media

  web:
    build: ./web
    command: sh -c "python manage.py migrate && python manage.py seed_demo && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file:
      - ./web/.env
    volumes:
      - ./web:/app
      - media_data:/app/media
    environment:
      DATABASE_URL: postgres://resume_user:resume_pass@db:5432/resume_ai
      AI_SERVICE_URL: http://ai:5000
      DJANGO_ALLOWED_HOSTS: 0.0.0.0,localhost,127.0.0.1
    depends_on:
      - db
      - ai

volumes:
  db_data:
  media_data:
